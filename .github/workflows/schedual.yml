name: run schedule job
on:
  schedule:
    - cron: '0 0 * * *' # This cron expression runs the workflow every day at midnight. Adjust it as needed.  
jobs:
  run-schedule-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x' # Use the latest LTS Node.js version for better compatibility

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      # Optionally, you can add more steps for building, linting, or deploying your application