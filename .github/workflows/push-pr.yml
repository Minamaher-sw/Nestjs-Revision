name: Push Pull Request To Main
on :
    push:
        branches:
            - "Feature/**" # Trigger on pushes to feature branches
            - "Bugfix/**" # Trigger on pushes to bugfix branches
            - "Hotfix/**" # Trigger on pushes to hotfix branches
            - "Release/**" # Trigger on pushes to release branches
            - "Refactor/**" # Trigger on pushes to refactor branches
            - "refs/**" # Trigger on pushes to refs branches
            - "Test/**" # Trigger on pushes to test branches
        paths:
            - "src/**/*.ts" # Trigger only on changes to TypeScript files at src directory
            - ".github/workflows/push-pr.yml" # Trigger on changes to the workflow file itself
    pull_request:
        branches:
            - main
            - develop
            - production
        paths:
            - "src/**/*.ts" # Trigger only on changes to TypeScript files at src directory
            - ".github/workflows/push-pr.yml" # Trigger on changes to the workflow file itself
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20.x' # Use the latest LTS Node.js version for better compatibility

            - name: Install dependencies
              run: npm install

            - name: Run tests
              run: npm test
            - name: Build project
              run: npm run build